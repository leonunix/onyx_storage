[meta]
path = "/mnt/metadb/onyx-bench"
block_cache_mb = 64

[storage]
data_device = "/dev/loop102"
block_size = 4096
use_hugepages = false
default_compression = "None"

[buffer]
device = "/dev/loop101"
capacity_mb = 128
flush_watermark_pct = 80
group_commit_wait_us = 500
shards = 4

[ublk]
nr_queues = 4
queue_depth = 128
io_buf_bytes = 1048576

[flush]
# per flush lane (1 lane per buffer shard). total = shards × compress_workers
compress_workers = 2
coalesce_max_raw_bytes = 131072
coalesce_max_lbas = 32

[engine]
zone_count = 16
zone_size_blocks = 256

[gc]
enabled = false

[dedup]
enabled = true
# per flush lane
workers = 2
