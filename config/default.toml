[meta]
path = "/data/onyx/metadb"
block_cache_mb = 256
# wal_dir = "/data/onyx/wal"

[storage]
data_device = "/dev/vg0/onyx-data"
block_size = 4096
use_hugepages = false
default_compression = "Lz4"

[buffer]
device = "/dev/vg0/onyx-buffer"
capacity_mb = 16384
flush_watermark_pct = 80
group_commit_wait_us = 250

[ublk]
nr_queues = 4
queue_depth = 128
io_buf_bytes = 1048576
